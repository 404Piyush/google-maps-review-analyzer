name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install deps (skip puppeteer browser download)
        run: |
          PUPPETEER_SKIP_DOWNLOAD=true npm ci --no-audit --no-fund
      - name: Syntax check
        run: |
          for f in index.js topic-analysis.js places-api.js analyze.js bin/cli.js demo/serve.js lib/*.js test/*.js; do
            [ -f "$f" ] && node --check "$f"
          done
      - name: Unit tests
        run: npm test
