services:
  - type: web
    name: gmaps-scraper
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile.gosom
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: PORT
        value: 8080
      - key: GOSOM_INTERNAL_PORT
        value: "8888"
      - key: CACHE_TTL_HOURS
        value: "24"
      - key: SCRAPER_API_KEY
        generateValue: true
        # For production, set this to a real secret in the Render dashboard.